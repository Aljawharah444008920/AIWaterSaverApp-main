<<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Ai Water Saver</title>
    <style>
        :root{
            --bg1:#eef8ff;
            --bg2:#f8fdff;
            --primary:#1177cc;
            --accent:#12b4d8;
            --text:#163650;
            --muted:#6d8092;
        }

        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:Tahoma, Arial, sans-serif;
            min-height:100vh;
            display:grid;
            place-items:center;
            background:
                radial-gradient(circle at top left, rgba(18,180,216,0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(17,119,204,0.10), transparent 35%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            color:var(--text);
        }

        .card{
            width:min(460px, 92%);
            background:rgba(255,255,255,0.88);
            backdrop-filter:blur(10px);
            border-radius:30px;
            padding:34px;
            box-shadow:0 20px 60px rgba(17,119,204,0.10);
            animation:fadeUp 0.8s ease;
        }

        @keyframes fadeUp{
            from{opacity:0; transform:translateY(24px);}
            to{opacity:1; transform:translateY(0);}
        }

        .logo{
            width:58px;
            height:58px;
            border-radius:18px;
            background:linear-gradient(135deg, var(--primary), var(--accent));
            display:grid;
            place-items:center;
            color:#fff;
            font-size:1.4rem;
            margin-bottom:18px;
        }

        h1{margin:0 0 10px; font-size:2rem;}
        p{margin:0 0 20px; color:var(--muted); line-height:1.8;}

        input{
            width:100%;
            padding:15px 16px;
            border-radius:16px;
            border:1px solid rgba(17,119,204,0.14);
            margin-bottom:12px;
            font-size:1rem;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg, var(--primary), var(--accent));
            color:#fff;
            font-size:1rem;
            font-weight:800;
            cursor:pointer;
            box-shadow:0 12px 28px rgba(17,119,204,0.24);
        }

        .error{
            margin-bottom:14px;
            padding:12px 14px;
            border-radius:14px;
            background:#fff0f0;
            color:#c0392b;
            font-weight:700;
        }

        .link{
            margin-top:16px;
            text-align:center;
        }

        .link a{
            color:var(--primary);
            text-decoration:none;
            font-weight:800;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💧</div>
        <h1>إنشاء حساب</h1>
        <p>ابدأ استخدام موفر المياه الذكي وتابع كفاءة استهلاك المياه بطريقة أوضح وأكثر تفاعلية.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم (3 أحرف أو أكثر)" required>
            <input type="password" name="password" placeholder="كلمة المرور (6 أحرف أو أكثر)" required>
            <button type="submit">إنشاء الحساب</button>
        </form>

        <div class="link">
            <a href="/login">لديك حساب بالفعل؟ سجل الدخول</a>
        </div>
    </div>
</body>
</html>
