<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>منصة تحليل استهلاك الماء</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    margin:0;
    font-family: system-ui;
    background: linear-gradient(135deg,#dbeafe,#bbf7d0);
}

.wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

.card-main{
    width:100%;
    max-width:850px;
    background:white;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
    padding:40px;
}

.upload-box{
    border:2px dashed #94a3b8;
    border-radius:16px;
    padding:35px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.upload-box.dragover{
    border-color:#0ea5e9;
    background:#f0f9ff;
}

.btn-main{
    border-radius:999px;
    padding:12px 30px;
    border:none;
    font-weight:600;
    background:linear-gradient(135deg,#0ea5e9,#22c55e);
    color:white;
}

/* Loading */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #e5e7eb;
    border-top: 6px solid #0ea5e9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="wrapper">
<div class="card-main">

<h3 class="text-center mb-4">تحليل استهلاك الماء بالذكاء الاصطناعي</h3>

{% if error %}
<div class="alert alert-danger text-center">
{{ error }}
</div>
{% endif %}

<form method="post" enctype="multipart/form-data" onsubmit="return showLoading()">
    
    <div id="drop-area" class="upload-box mb-3">
        <p id="file-label">⬆️ اسحب الفيديو هنا أو اضغط للاختيار</p>
        <input type="file" id="fileInput" name="file" accept="video/*" required hidden>
    </div>

    <div class="text-center">
        <button type="submit" id="submitBtn" class="btn btn-main">
            تحليل الفيديو
        </button>
    </div>

</form>

</div>
</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <h5>جاري تحليل الفيديو...</h5>
    <p>يرجى الانتظار</p>
</div>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const fileLabel = document.getElementById("file-label");
const submitBtn = document.getElementById("submitBtn");

dropArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileLabel.textContent = "تم اختيار: " + fileInput.files[0].name;
    }
});

dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
    fileLabel.textContent = "تم اختيار: " + e.dataTransfer.files[0].name;
});

function showLoading() {
    if (fileInput.files.length === 0) {
        alert("يرجى اختيار فيديو أولاً");
        return false;
    }
    document.getElementById("loading").style.display = "flex";
    submitBtn.disabled = true;
    submitBtn.innerText = "جاري التحليل...";
    return true;
}
</script>

</body>
</html>
