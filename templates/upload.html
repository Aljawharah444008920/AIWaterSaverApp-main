<<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Water Saver</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Cairo',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#e3f2fd,#e8f5e9);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:24px;
            box-shadow:0 20px 40px rgba(0,0,0,0.1);
            text-align:center;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:20px;
            font-size:14px;
        }

        .top-bar a{
            text-decoration:none;
            color:#1976d2;
            font-weight:700;
        }

        h1{
            font-size:42px;
            color:#1f2d3d;
            margin-bottom:10px;
        }

        .subtitle{
            color:#666;
            line-height:1.9;
            font-size:17px;
            margin-bottom:25px;
        }

        .upload-box{
            margin-top:15px;
            padding:30px;
            border:2px dashed #90caf9;
            border-radius:20px;
            background:#f9fcff;
        }

        input[type="file"]{
            margin-bottom:12px;
            font-size:15px;
        }

        .hint{
            color:#777;
            font-size:14px;
            line-height:1.8;
        }

        button{
            margin-top:24px;
            padding:15px 32px;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:700;
            color:white;
            cursor:pointer;
            background:linear-gradient(135deg,#2196f3,#1976d2);
            box-shadow:0 10px 20px rgba(33,150,243,0.3);
            transition:0.25s;
        }

        button:hover{
            transform:scale(1.04);
        }

        .error{
            margin-top:18px;
            background:#fdecea;
            color:#b42318;
            border:1px solid #f5c6cb;
            padding:12px;
            border-radius:12px;
            font-size:15px;
        }

        .loader{
            display:none;
            margin-top:22px;
        }

        .spinner{
            width:55px;
            height:55px;
            border:6px solid #ddd;
            border-top:6px solid #2196f3;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:0 auto 10px;
        }

        @keyframes spin{
            100%{transform:rotate(360deg);}
        }

        @media(max-width:600px){
            .container{
                padding:28px 20px;
            }

            h1{
                font-size:32px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <a href="/dashboard">لوحة التحكم</a>
        <div>مرحبًا {{ username }}</div>
        <a href="/logout">تسجيل الخروج</a>
    </div>

    <h1>💧 AI Water Saver</h1>

    <p class="subtitle">
        نظام ذكي لتحليل استهلاك المياه أثناء غسل اليدين واكتشاف الهدر
        وتقديم نصائح تساعد على ترشيد الاستخدام.
    </p>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        <div class="upload-box">
            <input type="file" name="file" accept="video/*" required>
            <p class="hint">ارفع فيديو واضح لغسل اليدين بحجم لا يتجاوز 7MB</p>
        </div>

        <button type="submit">تحليل الفيديو</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>جاري تحليل الفيديو...</p>
    </div>

</div>

<script>
function showLoader(){
    document.getElementById("loader").style.display="block";
}
</script>

</body>
</html>
