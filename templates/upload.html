<<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحليل استهلاك المياه</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }

        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

        .hint {
            margin-top: 10px;
            font-size: 13px;
            color: #888;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>تحليل استهلاك المياه</h1>

    <p>ارفع فيديو لغسل اليدين لتحليل كمية المياه المستخدمة والهدر</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="video/*" required>
        <br>
        <button type="submit">تحليل الفيديو</button>
    </form>

    <!-- رسالة الخطأ -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <!-- تنبيه الحجم -->
    <div class="hint">
        الحد الأقصى لحجم الفيديو: 7MB<br>
        يفضل أن يكون الفيديو قصيرًا للحصول على أفضل نتيجة
    </div>

</div>

</body>
</html>
